<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Mutual Radar</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <section class="hero">
        <h1 id="popup-title">X Mutual Radar</h1>
        <p id="popup-subtitle" class="subtitle">Automatically label mutual and one-way follow relationships on x.com, with an optional following / followers rate.</p>
        <p class="author-line">
          <span id="author-label">Author</span>
          <a id="author-link" href="https://x.com/chyni" target="_blank" rel="noreferrer"> @chyni</a>
          <span id="planner-label" style="padding-left: 1ch;">Planner</span>
          <a id="planner-link" href="https://x.com/lihuaizhi" target="_blank" rel="noreferrer">@lihuaizhi</a>
        </p>
      </section>

      <section class="card">
        <label class="inline-select-row" for="language-select">
          <strong id="language-label">Language</strong>
          <select id="language-select">
            <option value="en">English</option>
            <option value="zh_CN">中文</option>
            <option value="ja">日本語</option>
          </select>
        </label>

        <label class="inline-select-row" for="badge-position-select">
          <strong id="badge-position-title">Badge position</strong>
          <select id="badge-position-select">
            <option id="badge-position-top-right-option" value="top_right">Top-right</option>
            <option id="badge-position-header-option" value="header">Below author row</option>
          </select>
        </label>

        <label class="inline-select-row" for="badge-font-size-select">
          <strong id="badge-font-size-title">Badge font size</strong>
          <select id="badge-font-size-select">
            <option value="10">10px</option>
            <option value="11">11px</option>
            <option value="12" selected>12px</option>
            <option value="13">13px</option>
            <option value="14">14px</option>
            <option value="15">15px</option>
          </select>
        </label>

        <label class="toggle-row" for="enabled-toggle">
          <span>
            <strong id="enabled-title">Extension</strong>
          </span>
          <input id="enabled-toggle" type="checkbox">
        </label>
        <label class="toggle-row toggle-row-secondary" for="show-badge-label-toggle">
          <span>
            <strong id="show-badge-label-title">Show labels</strong>
          </span>
          <input id="show-badge-label-toggle" type="checkbox">
        </label>
        <label class="toggle-row toggle-row-secondary" for="show-badge-numbers-toggle">
          <span>
            <strong id="show-badge-numbers-title">Show follow rate</strong>
          </span>
          <input id="show-badge-numbers-toggle" type="checkbox">
        </label>
        <label class="toggle-row toggle-row-secondary" for="show-all-follow-rates-toggle">
          <span>
            <strong id="show-all-follow-rates-title">Show all rates</strong>
          </span>
          <input id="show-all-follow-rates-toggle" type="checkbox">
        </label>
      </section>
    </main>

    <script src="../src/shared.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
